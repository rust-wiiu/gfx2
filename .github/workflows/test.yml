name: Automatic tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - Cargo.toml
      - Cargo.lock
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - Cargo.toml
      - Cargo.lock

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build tests
        run: cargo test --no-run
      - name: Run tests
        run: cargo test -- --no-capture
